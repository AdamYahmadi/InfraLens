name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ""
          - os: macos-13          
            rust_target: x86_64-apple-darwin
            tauri_args: "--target x86_64-apple-darwin"
          - os: macos-latest      
            rust_target: aarch64-apple-darwin
            tauri_args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build backend (PyInstaller)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          pyinstaller --clean --noconfirm infralens-backend.spec

      - name: Stage backend as Tauri sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp "backend/dist/infralens-backend" "src-tauri/binaries/infralens-backend-${{ matrix.rust_target }}"
          chmod +x "src-tauri/binaries/infralens-backend-${{ matrix.rust_target }}"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf file libxdo-dev \
            build-essential curl wget libssl-dev

      - name: Install JS dependencies
        run: |
          npm install
          npm --prefix frontend install

      - name: Generate app icons
        run: npx tauri icon ./appicon.png

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "InfraLens ${{ github.ref_name }}"
          releaseBody: "Automated build. See assets below for macOS (.dmg) and Linux (.AppImage / .deb)."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}
